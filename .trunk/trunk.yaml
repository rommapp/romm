# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.10.2
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.14.4
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  disabled:
    - svgo
    - oxipng
    - pyright
  enabled:
    - grype@0.110.0
    - pinact@4.0.0
    - dotenv-linter@4.0.0
    - hadolint@2.14.0
    - markdownlint@0.49.1
    - eslint@10.7.0
    - actionlint@1.7.11
    - bandit@1.9.4
    - black@26.5.1
    - checkov@3.3.8
    - git-diff-check
    - isort@8.0.1
    - mypy@2.3.0
    - osv-scanner@2.3.3
    - prettier@3.9.5:
        packages:
          - "@trivago/prettier-plugin-sort-imports@6.0.2"
          - "@vue/compiler-sfc@3.5.40"
    - ruff@0.15.22
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - taplo@0.10.0
    - trivy@0.70.0
    - trufflehog@3.93.7
    - yamllint@1.38.0
  ignore:
    - linters: [ALL]
      paths:
        - frontend/src/__generated__/**
        - docker/Dockerfile
        - docker/nginx/js/**
        # Vendored patcherjs library
        - backend/utils/rom_patcher/patcher.js
        # Intentionally malformed YAML, used as a test fixture
        - backend/tests/config/fixtures/config/malformed_config.yml
    # Alembic env/migrations rely on runtime-injected globals (context, op)
    # that mypy cannot resolve; already excluded in mypy.ini, but Trunk passes
    # changed files explicitly, which bypasses that exclude.
    - linters: [mypy]
      paths:
        - backend/alembic/**
  files:
    - name: vue
      extensions: [vue]
  definitions:
    - name: eslint
      files:
        - javascript
        - typescript
      commands:
        - name: lint
          run_from: ${root_or_parent_with_any_config}
    - name: prettier
      files:
        - typescript
        - yaml
        - css
        - postcss
        - html
        - markdown
        - json
        - javascript
        - graphql
        - vue
        - prettier_supported_configs
actions:
  disabled:
    - trunk-check-pre-push
  enabled:
    - trunk-announce
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
