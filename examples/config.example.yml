# system:
#   # Asociate different platform names to your current file system platform names
#   # [your custom platform folder name]: [RomM platform name]
#   # In this example if you have a 'gc' folder, RomM will treat it like the 'ngc' folder
#   platforms:
#     gc: ngc
#     ps1: psx

#   # Asociate one platform to it's main version (IGDB only)
#   versions:
#     naomi: arcade

# filesystem:
#   # Custom games folder name only (eg. `retro_games/`)
#   roms_folder: 'roms'
#   # Skip file hash calculations on low power devices (eg. Raspberry PI)
#   skip_hash_calculation: false
#   # Custom library structure, per platform. By default a platform's ROM folder
#   # is scanned one level deep: each top-level file is a game and each top-level
#   # folder is a single multi-file game. A template lets you describe a deeper /
#   # organized layout instead. It is opt-in per platform (by fs_slug); platforms
#   # left out keep the default behavior.
#   #
#   # Syntax (Retrom-style): `/`-separated path sections, relative to the
#   # platform's ROM folder (RomM already resolves the library root, the
#   # roms_folder above, and the platform directory — so {library}/{platform}
#   # are not used here). A section wrapped in braces is a macro; a bare section
#   # is a literal folder name matched exactly. The LAST section must be a
#   # terminal macro:
#   #   - {gameFile} -> each file at that level is its own game;
#   #   - {gameDir}  -> each folder at that level is a single multi-file game.
#   # Any other braced section (e.g. {region}, {category}) is a wildcard
#   # directory level: it matches any folder and is purely organizational.
#   #
#   # A platform may also declare a LIST of templates instead of one; discovery
#   # is their union. This covers the common mixed layout — loose games at the
#   # platform root AND games inside grouping subfolders below it — which a
#   # single fixed-depth template can't express on its own.
#   #
#   # Notes:
#   #   - Hidden (dot-prefixed) folders are never descended into or surfaced.
#   #   - {gameDir} keeps a folder whole (multi-disc / cue+bin games), so there
#   #     is no guessing — you declare file-vs-folder explicitly.
#   #   - Identity is content-based on scan: moving or renaming a game within the
#   #     structure is detected by its hash and relocated in place, so its saves,
#   #     play history, favorites and collection membership follow it (as long as
#   #     hashing is enabled and the platform is hashable). When a folder that was
#   #     previously scanned as one multi-file game is now descended into, the old
#   #     entry is marked "missing from filesystem" (the scan log flags it);
#   #     delete the stale entry to clean up.
#   #   - Two files with the same name in different folders become distinct games;
#   #     gamelist.xml metadata matching is by filename, so both may match the
#   #     same gamelist entry.
#   structure:
#     # Mixed: loose top-level games AND grouping subfolders below them, e.g.
#     #   roms/nes/game01.nes            (matched by {gameFile})
#     #   roms/nes/Hacks/game03.nes      (matched by {category}/{gameFile})
#     nes:
#       - '{gameFile}'
#       - '{category}/{gameFile}'
#     # roms/ps3/Disc/Game/, roms/ps3/PSN/Game/ -> each folder a multi-file game
#     ps3: '{category}/{gameDir}'
#     # roms/snes/USA/foo.sfc, roms/snes/Japan/bar.sfc
#     snes: '{region}/{gameFile}'

# scan:
#   # Metadata priority during scans
#   priority:
#     # Below are the default priority values used
#     metadata: # Top-level metadata source priority
#       - igdb # IGDB (highest priority)
#       - moby # MobyGames
#       - ss # Screenscraper
#       - ra # RetroAchievements
#       - launchbox # Launchbox
#       - gamelist # ES-DE gamelist.xml
#       - hasheous # Hasheous
#       - flashpoint # Flashpoint Project
#       - hltb # HowLongToBeat (lowest priority)
#     artwork: # Cover art and screenshots
#       - igdb # IGDB
#       - moby # MobyGames
#       - ss # Screenscraper
#       - ra # RetroAchievements
#       - launchbox # Launchbox
#       - libretro # Libretro
#       - gamelist # ES-DE gamelist.xml
#       - hasheous # Hasheous
#       - flashpoint # Flashpoint Project
#       - hltb # HowLongToBeat
#     region: # Used by IGDB and ScreenScraper for regional variants
#       - us
#       - wor
#       - ss
#       - eu
#       - jp
#     language: # Used by ScreenScraper for descriptions
#       - en
#       - fr
#     # Media assets to download
#     # Only used by Screenscraper and ES-DE gamelist.xml
#   media:
#     # Used as alternative cover art
#     - box2d  # Normal cover art (always enabled)
#     - box3d  # 3D box art
#     - miximage  # Mixed image of multiple media (v1 / mixrbv1)
#     - miximage_v2  # Mixed image of multiple media (v2 / mixrbv2)
#     - physical  # Disc, cartridge, etc.
#     # Added to the screenshots carousel
#     - screenshot  # Screenshot (enabled by default)
#     - title_screen  # Title screen
#     - fanart  # User uploaded artwork
#     # Bezel displayed around the emulatorjs window
#     - bezel
#     # Manual in PDF format
#     - manual # Manual (enabled by default)
#     # Gameplay video
#     - video  # Video (warning: large file size)
#     - video_normalized  # Normalized video (smaller file size than video)
#     # Media used for batocera gamelist.xml export
#     - box2d_back  # Back cover art
#     - logo  # Transparent logo
#     # Other media assets (might be used in the future)
#     - marquee  # Custom marquee
#   # Auto-export metadata files after scan completes
#   gamelist:
#     export: false # Whether to export gamelist.xml for ES-DE/Batocera/RetroBAT
#     media:
#       # Select a media type from the list above (eg. box2d, screenshot, etc.)
#       thumbnail: box2d # Use as the <thumbnail> tag in the exported gamelist.xml
#       image: screenshot  # Use as the <image> tag in the exported gamelist.xml
#   pegasus:
#     export: false # Whether to export metadata.pegasus.txt for Pegasus

